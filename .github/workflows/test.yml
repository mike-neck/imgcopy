name: run swift test

on:
  push:
    branches:
      - main
      - master
      - feature/*

jobs:
  test:
    strategy:
      matrix:
        runner:
          - macos-15
    runs-on: ${{ matrix.runner }}
    name: "Test on ${{ matrix.runner }}"
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - uses: swift-actions/setup-swift@v3
        name: Configure Swift version
        with:
          swift-version: "6.3"

      - name: Show Swift version
        run: swift --version

      - name: Run Tests
        run: make test

      - name: Build artifact
        run: make build

      - name: Show path
        run: make show-path

      - name: Pick binaries
        run: make pick

      - name: Show binaries
        run: find build -type f -exec test -x {} \; -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "test-report-${{ matrix.runner }}"
          path: build/test
